services:
  # Banco de Dados PostgreSQL 15 - Persistente via volume Docker
  db:
    image: postgres:15-alpine
    container_name: scrap_csp_db
    environment:
      POSTGRES_DB: scrap_csp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password  # Alterar para produção
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d scrap_csp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servidor de API (Backend)
  api:
    build: ./backend
    container_name: scrap_csp_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgres://user:password@db:5432/scrap_csp
      JWT_SECRET: super_secret_token_para_auditoria_csp  # Alterar
      NODE_ENV: production
    ports:
      - "5000:5000"

  # Motor de Background (Worker das Auditorias)
  worker:
    build: ./backend
    container_name: scrap_csp_worker
    command: ["npm", "run", "worker"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://user:password@db:5432/scrap_csp
      NODE_ENV: production

  # Portal de Usuário (Frontend)
  frontend:
    build: ./frontend
    container_name: scrap_csp_ui
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
